<!DOCTYPE html>
<html>

<head>
    <title>Q9 - File Upload with Progress Bar</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        /* The grey background track of the bar */
        .progress-track {
            width: 100%;
            background: #e0e0e0;
            border-radius: 8px;
            height: 20px;
            margin-top: 12px;
            display: none;
        }

        /* The colored fill that grows as upload progresses */
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4caf50;
            border-radius: 8px;
            transition: width 0.2s ease;
        }
    </style>
</head>

<body>

    <h2>Q9 - File Upload with Progress Bar</h2>

    <input type="file" id="fileInput" accept="image/*" />
    <br><br>
    <button onclick="uploadFile()">Upload File</button>

    <div class="progress-track" id="track">
        <div class="progress-fill" id="fill"></div>
    </div>

    <p id="percentage">0%</p>
    <p id="status"></p>

    <script>

        function uploadFile() {

            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            // Check if user actually selected a file
            if (!file) {
                document.getElementById('status').innerText = 'Please select a file first.';
                return;
            }

            // FormData is how you package a file to send via HTTP
            const formData = new FormData();
            formData.append('file', file);

            // Show the progress bar track
            document.getElementById('track').style.display = 'block';
            document.getElementById('status').innerText = 'Uploading...';

            axios.post('https://httpbin.org/post', formData, {

                headers: {
                    'Content-Type': 'multipart/form-data'
                },

                // This fires repeatedly as upload progresses
                onUploadProgress: function (progressEvent) {

                    // Calculate percentage uploaded so far
                    const percentage = Math.round(
                        (progressEvent.loaded / progressEvent.total) * 100
                    );

                    // Update the visual bar width
                    document.getElementById('fill').style.width = percentage + '%';

                    // Update the percentage text
                    document.getElementById('percentage').innerText = percentage + '%';

                }

            })
                .then(function (response) {
                    document.getElementById('status').innerText = 'Upload complete!';
                    document.getElementById('percentage').innerText = '100%';
                })
                .catch(function (error) {
                    document.getElementById('status').innerText =
                        'Upload failed: ' + error.message;
                });
        }

    </script>

</body>

</html>
