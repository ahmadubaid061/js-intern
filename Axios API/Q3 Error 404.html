<!DOCTYPE html>
<html>
<head>
  <title>Q3 - Handle 404 Error</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <h2>Q3 - Error Handling</h2>
  <button onclick="fetchInvalidData()">Make Bad Request</button>
  <p id="message"></p>

  <script>

    function fetchInvalidData() {

      // This URL does not exist — will cause a 404
      axios.get('https://jsonplaceholder.typicode.com/invalidendpoint')
        .then(function(response) {
          document.getElementById('message').innerText = "Data received!";
        })
        .catch(function(error) {

          // Check if the server gave a response with an error code
          if (error.response) {
            document.getElementById('message').innerText =
              "Error " + error.response.status + ": Page not found. Please try a valid URL.";

          // No response at all (e.g. no internet)
          } else {
            document.getElementById('message').innerText =
              "Network error: Could not reach the server.";
          }

        });
    }

  </script>

</body>
</html>
