<!DOCTYPE html>
<html>
<head>
  <title>Q6 - Search with Debouncing</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <h2>Q6 - GitHub User Search</h2>
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Type a username to search..."
    style="padding: 8px; width: 300px; font-size: 14px;"
  />

  <p id="status"></p>
  <div id="results"></div>

  <script>

    // This variable holds the debounce timer
    let debounceTimer;

    // Runs every time user types something
    document.getElementById('searchInput').addEventListener('input', function() {

      const query = this.value.trim();

      // Clear the previous timer on every keystroke
      clearTimeout(debounceTimer);

      // If input is empty clear results and stop
      if (query === '') {
        document.getElementById('results').innerHTML = '';
        document.getElementById('status').innerText = '';
        return;
      }

      document.getElementById('status').innerText = 'Waiting for you to stop typing...';

      // Start a new timer — only fires if user stops typing for 500ms
      debounceTimer = setTimeout(function() {

        searchUsers(query);

      }, 500); // 500ms delay

    });

    function searchUsers(query) {

      document.getElementById('status').innerText = 'Searching...';
      document.getElementById('results').innerHTML = '';

      // Query parameter ?q=query is added here
      axios.get('https://api.github.com/search/users', {
        params: {
          q: query
        }
      })
        .then(function(response) {

          const users = response.data.items;

          if (users.length === 0) {
            document.getElementById('status').innerText = 'No users found.';
            return;
          }

          document.getElementById('status').innerText =
            'Found ' + users.length + ' users:';

          // Display each user
          let html = '';
          users.forEach(function(user) {
            html += '<p>' + user.login + 
                    ' — <a href="' + user.html_url + '" target="_blank">View Profile</a></p>';
          });

          document.getElementById('results').innerHTML = html;

        })
        .catch(function(error) {
          document.getElementById('status').innerText =
            'Error: ' + error.message;
        });
    }

  </script>

</body>
</html>
